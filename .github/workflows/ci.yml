name: CI — unit + integration + E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-flight runs for the same PR — speeds up the iteration loop and
# prevents wasteful spend when a contributor force-pushes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  c-suite:
    name: C unit + integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Run unit tests (56 — engine + scenarios)
        run: make test

      - name: Run integration tests (compiled example binaries)
        run: make integration

  wasm-build:
    name: WASM build drift check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.74
          actions-cache-folder: emsdk-cache

      - name: Build WebAssembly modules
        run: make wasm

      - name: Confirm built artifacts match committed
        run: |
          if ! git diff --quiet -- web/wasm; then
            echo "::warning::web/wasm differs from committed artifacts — run 'make wasm' locally and commit the result"
            git --no-pager diff --stat -- web/wasm
          else
            echo "WASM artifacts in repo match a fresh build"
          fi

  e2e:
    name: Web E2E (Playwright + Gherkin BDD)
    runs-on: ubuntu-latest
    needs: c-suite
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install E2E dependencies
        working-directory: e2e
        run: npm install

      - name: Install Playwright Chromium
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: Generate Playwright specs from Gherkin features
        working-directory: e2e
        run: npx bddgen

      - name: Run E2E suite
        working-directory: e2e
        run: npx playwright test --reporter=list,html

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7

# ---- Deployment ----
# Vercel handles deployment via its native GitHub integration (auto-deploy on
# push to main, preview deploys on PRs). The CI jobs above run in parallel
# with Vercel's build — they don't gate it. To require these checks before
# Vercel ships to production, enable "Only deploy if checks pass" in the
# Vercel project settings (Settings → Git → Production Branch checks).
