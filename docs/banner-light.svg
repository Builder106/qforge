<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 400" width="1600" height="400">
  <!--
    README banner — light variant. Paired with banner-dark.svg via a
    <picture> element in README.md.
    Rasterize with: rsvg-convert -w 1600 docs/banner-light.svg -o docs/banner-light.png
  -->

  <defs>
    <radialGradient id="glow-light" cx="20%" cy="-20%" r="80%">
      <stop offset="0%"   stop-color="#0066cc" stop-opacity="0.10"/>
      <stop offset="60%"  stop-color="#0066cc" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#fafafa" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="400" fill="#fafafa"/>
  <rect width="1600" height="400" fill="url(#glow-light)"/>

  <text x="90" y="190"
        font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace"
        font-size="160" font-weight="700" fill="#1a1d22" letter-spacing="-6">
    qforge
  </text>

  <text x="92" y="255"
        font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace"
        font-size="30" fill="#2f8f3f" font-weight="600">
    A neural network from scratch in C99.
  </text>

  <text x="92" y="305"
        font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace"
        font-size="22" fill="#6a7280">
    Zero deps · ~2,000 lines of C · WASM demos in your browser
  </text>

  <!-- Q monogram on the right, vertically centered -->
  <g transform="translate(1430, 200)">
    <circle cx="0" cy="-15" r="78" fill="none" stroke="#0066cc" stroke-width="26"/>
    <rect x="70" y="-75" width="26" height="195" fill="#0066cc"/>
  </g>
</svg>
