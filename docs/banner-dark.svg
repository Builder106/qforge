<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 400" width="1600" height="400">
  <!--
    README banner — dark variant. Paired with banner-light.svg via a
    <picture> element in README.md so GitHub's renderer picks whichever
    matches the visitor's color-scheme preference.
    Rasterize with: rsvg-convert -w 1600 docs/banner-dark.svg -o docs/banner-dark.png
  -->

  <defs>
    <radialGradient id="glow-dark" cx="20%" cy="-20%" r="80%">
      <stop offset="0%"   stop-color="#7cc4ff" stop-opacity="0.18"/>
      <stop offset="60%"  stop-color="#7cc4ff" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#0b0d10" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="400" fill="#0b0d10"/>
  <rect width="1600" height="400" fill="url(#glow-dark)"/>

  <text x="90" y="190"
        font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace"
        font-size="160" font-weight="700" fill="#e6e8eb" letter-spacing="-6">
    qforge
  </text>

  <text x="92" y="255"
        font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace"
        font-size="30" fill="#b3f5a8" font-weight="600">
    A neural network from scratch in C99.
  </text>

  <text x="92" y="305"
        font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace"
        font-size="22" fill="#9aa3ad">
    Zero deps · ~2,000 lines of C · WASM demos in your browser
  </text>

  <!-- Q monogram on the right, vertically centered -->
  <g transform="translate(1430, 200)">
    <circle cx="0" cy="-15" r="78" fill="none" stroke="#7cc4ff" stroke-width="26"/>
    <rect x="70" y="-75" width="26" height="195" fill="#7cc4ff"/>
  </g>
</svg>
